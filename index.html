<!doctype html>
<html>
  <head>
    <title>Chitenge by Me | African Fabrics Catalog</title>
    <meta name="description" content="SomeAfrican inspiration for beginner sewists!" />
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Chitenge by Me</h1>
      <p class="subtitle">Roots through fabric</p>
    </header>

    <div class="filters">
      <div class="filter-group">
        <label for="difficulty-filter">Difficulty</label>
        <select id="difficulty-filter">
          <option value="all">All Levels</option>
          <option value="beginner">Beginner</option>
          <option value="intermediate">Intermediate</option>
          <option value="advanced">Advanced</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="occasion-filter">Occasion</label>
        <select id="occasion-filter">
          <option value="all">All Occasions</option>
          <option value="everyday">Everyday</option>
          <option value="ceremonial">Ceremonial</option>
          <option value="wedding">Wedding</option>
          <option value="festival">Festival</option>
          <option value="funeral">Funeral</option>
        </select>
      </div>
      <div class="filter-group favorites-group">
        <label>&nbsp;</label>
        <button id="favorites-toggle">♡ Show Favorites</button>
      </div>
    </div>

    <div id="card-container"></div>

    <div class="card" style="display: none">
      <div class="card-content">
        <div class="card-top">
          <div class="card-top-left">
            <h2>Fabric Name</h2>
            <p class="origin"></p>
            <p class="region"></p>
            <p class="type"></p>
          </div>
          <img src="" alt="" class="card-img" />
        </div>
        <p class="description"></p>
        <p class="difficulty"></p>
        <p class="occasion"></p>
        <p class="uses"></p>
        <p class="care"></p>
        <p class="cultural-note"></p>
        <p class="beginner-tip"></p>
        <button class="favorite-btn">♡ Save</button>
      </div>
    </div>

    <footer class="footer">
      <p>Embracing Africanasity</p>
    </footer>
  </body>
</html>
